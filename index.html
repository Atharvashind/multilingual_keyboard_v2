<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MultiLanguage Keyboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;600&family=Noto+Sans+Devanagari&family=Noto+Sans+Bengali&family=Noto+Sans+Telugu&family=Noto+Sans+Tamil&family=Noto+Sans+Gujarati&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #667eea; --secondary: #764ba2; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Noto Sans', sans-serif;
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 1000px; margin: 0 auto; }
        header { text-align: center; color: white; margin-bottom: 30px; }
        h1 { font-size: 2.5rem; margin-bottom: 10px; }
        .card {
            background: white;
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        textarea {
            width: 100%;
            min-height: 150px;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 18px;
            font-family: 'Noto Sans','Noto Sans Devanagari','Noto Sans Bengali','Noto Sans Telugu','Noto Sans Tamil',sans-serif;
            resize: vertical;
            margin-bottom: 20px;
        }
        textarea:focus { outline: none; border-color: var(--primary); }
        .controls { display: flex; gap: 10px; flex-wrap: wrap; }
        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            background: var(--primary);
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn:hover { background: var(--secondary); transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0,0,0,0.2); }
        .btn.danger { background: #e74c3c; }
        .btn.danger:hover { background: #c0392b; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🌍 MultiLanguage Keyboard</h1>
            <p>Type in English, Hindi, Marathi, Telugu, Tamil &amp; Bengali</p>
        </header>

        <div class="card">
            <textarea id="display" placeholder="Type here using the keyboard below..."></textarea>
            <div class="controls">
                <button class="btn" onclick="copyText()">📋 Copy</button>
                <button class="btn" onclick="kb.speak()">🔊 Speak</button>
                <button class="btn" onclick="downloadText()">💾 Download</button>
                <button class="btn danger" onclick="kb.clear()">🗑️ Clear</button>
            </div>
        </div>

        <div id="keyboard"></div>
    </div>

    <script src="dist/keyboard.js"></script>
    <script>
        const kb = new MultiLanguageKeyboard('#keyboard', {
            targetInput: document.getElementById('display'),
            language: 'english',
            showControls: false
        });

        function copyText() {
            const text = document.getElementById('display').value;
            if (!text) return;
            navigator.clipboard.writeText(text).catch(() => {
                // Fallback for older browsers
                document.getElementById('display').select();
                document.execCommand('copy');
            });
        }

        function downloadText() {
            const text = document.getElementById('display').value;
            if (!text) return;
            const blob = new Blob([text], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `text-${Date.now()}.txt`;
            a.click();
            URL.revokeObjectURL(url);
        }
    </script>
</body>
</html>
